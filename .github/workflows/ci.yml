name: Meta Tag Analyzer CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: npm

      - name: Validate package.json syntax
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('✅ package.json is valid');"

      - name: Install dependencies
        run: npm ci

      - name: Run linting (if present)
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm run test:unit --if-present

      - name: Run MVP measurements tests
        run: npm run test:mvp --if-present

      - name: Build application
        run: npm run build

      - name: Start API server
        run: |
          npm run start &
          for i in {1..30}; do
            if curl -sSf http://localhost:5000/api/health >/dev/null; then
              echo "API is healthy";
              break;
            fi
            echo "Waiting for API to start...";
            sleep 2;
          done
          if ! curl -sSf http://localhost:5000/api/health >/dev/null; then
            echo "API failed to start";
            exit 1;
          fi
        shell: bash

      - name: Run integration tests
        run: npm run test:integration --if-present

      - name: Validate MVP measurements integration
        run: node validate-deployment.js

      - name: Run E2E tests
        run: npm run test:e2e --if-present

      - name: Smoke test production server (localhost)
        run: npm run smoke:server --if-present

      - name: Stop API server
        if: always()
        run: |
          pkill -f "node dist/index.js" || true
