name: Meta Tag Analyzer CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js from .nvmrc
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          next/package-lock.json

    - name: Install dependencies (root + next)
      run: |
        npm install --legacy-peer-deps
        npm --prefix next install --legacy-peer-deps

    - name: Run linting
      run: npm run lint || echo "Linting skipped"
    
    - name: Run structure tests
      run: node test.js
    
    - name: Run API tests
      run: node api-test.js
    
    - name: Run frontend tests
      run: node frontend-check.js
    
    - name: Run all tests with test script
      run: bash npm-test.sh
    
    - name: Build application
      run: npm run build --if-present

    - name: Lint Next.js app
      run: npm run lint
      working-directory: next

    - name: Build Next.js app
      run: npm run build
      working-directory: next
