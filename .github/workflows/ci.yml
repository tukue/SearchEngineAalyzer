name: Meta Tag Analyzer CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: test
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Verify .nvmrc is present
        run: |
          test -f .nvmrc
          echo "Using Node version from .nvmrc: $(cat .nvmrc)"

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            next/package-lock.json

      - name: Verify Node version
        run: node --version

      - name: Install dependencies (root + next)
        run: |
          npm install --legacy-peer-deps
          npm --prefix next install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: verify
    environment: build
    env:
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            next/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/public
