name: Deploy main frontend to Vercel

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref (branch, tag, or commit) to deploy
        default: main
        required: true

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Test and deploy static frontend
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_ref }}

      - name: Document root cause of previous failures
        run: |
          echo "Root cause: Vercel still built from the repository root, so server sources were published instead of the compiled SPA."
          echo "Fix: prepare a Vercel v3 output with only the built static client and deploy it with --prebuilt so no server code is uploaded or compiled."

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: |
          npm run lint --if-present
          bash run-tests.sh
          npm run check --if-present

      - name: Build frontend only
        run: |
          npm run build:frontend
          mkdir -p .vercel/output/static
          rsync -a --delete dist/public/ .vercel/output/static/
          cat > .vercel/output/config.json <<'EOF'
          {"version":3,"routes":[{"src":"/(.*)","dest":"/index.html"}]}
          EOF
          ls -lah .vercel/output/static

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Deploy static frontend output
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --yes
