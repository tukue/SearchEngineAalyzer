name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref (branch, tag, or commit) to deploy
        default: main
        required: true
      approvers:
        description: Comma-separated GitHub usernames who can approve the production release
        required: true
        type: choice
        options:
          - 'tukue'
          - 'tukue,admin'
      approval_timeout_minutes:
        description: Minutes to wait for manual approval before cancelling (5-240)
        default: '60'
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  validate_inputs:
    name: Validate deployment inputs
    runs-on: ubuntu-latest
    outputs:
      sanitized_approvers: ${{ steps.validate.outputs.sanitized_approvers }}
      timeout_minutes: ${{ steps.validate.outputs.timeout_minutes }}
      normalized_ref: ${{ steps.validate.outputs.normalized_ref }}
    steps:
      - name: Validate approvers and timeout
        id: validate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const parseList = (value) =>
              value
                .split(',')
                .map((entry) => entry.trim())
                .filter((entry) => entry.length > 0);

            const allowlistRaw = core.getInput('allowlist') || core.getInput('allowlist_secret');
            if (!allowlistRaw) {
              core.setFailed('No approver allowlist configured. Set repository variable or secret "VERCEL_PROD_APPROVERS" with allowed usernames.');
              return;
            }

            const allowed = Array.from(new Set(parseList(allowlistRaw)));
            if (allowed.length === 0) {
              core.setFailed('The approver allowlist is empty.');
              return;
            }

            const rawApprovers = core.getInput('approvers', { required: true });
            const requested = Array.from(new Set(parseList(rawApprovers)));
            if (requested.length === 0) {
              core.setFailed('At least one approver must be provided.');
              return;
            }

            const usernamePattern = /^[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,37}[a-zA-Z0-9])?$/;
            const invalidNames = requested.filter((name) => !usernamePattern.test(name));
            if (invalidNames.length > 0) {
              core.setFailed(`Invalid GitHub usernames: ${invalidNames.join(', ')}`);
              return;
            }

            const unauthorized = requested.filter((name) => !allowed.includes(name));
            if (unauthorized.length > 0) {
              core.setFailed(`Approvers not in allowlist: ${unauthorized.join(', ')}`);
              return;
            }

            const timeoutRaw = core.getInput('timeout', { required: true }).trim();
            if (!/^\d+$/.test(timeoutRaw)) {
              core.setFailed('Approval timeout must be a positive integer.');
              return;
            }

            const timeoutMinutes = Number.parseInt(timeoutRaw, 10);
            if (!Number.isInteger(timeoutMinutes) || timeoutMinutes < 5 || timeoutMinutes > 240) {
              core.setFailed('Approval timeout must be between 5 and 240 minutes.');
              return;
            }

            const ref = core.getInput('ref', { required: true }).trim();
            const normalizedRef = ref
              .replace(/^refs\/heads\//, '')
              .replace(/^refs\/tags\//, '');

            const isMain = normalizedRef === 'main';
            const isReleaseBranch = normalizedRef.startsWith('release/');
            const isSemverTag = /^v\d+\.\d+\.\d+$/.test(normalizedRef);

            if (!isMain && !isReleaseBranch && !isSemverTag) {
              core.setFailed(
                `Deployments can only target the main branch or release branches/tags. Received: ${ref}`
              );
              return;
            }

            core.setOutput('sanitized_approvers', requested.join(','));
            core.setOutput('timeout_minutes', `${timeoutMinutes}`);
            core.setOutput('normalized_ref', normalizedRef);
          approvers: ${{ github.event.inputs.approvers }}
          timeout: ${{ github.event.inputs.approval_timeout_minutes }}
          allowlist: ${{ vars.VERCEL_PROD_APPROVERS }}
          allowlist_secret: ${{ secrets.VERCEL_PROD_APPROVERS }}
          ref: ${{ github.event.inputs.release_ref }}

  verify-ci-status:
    name: Ensure CI is green on release ref
    runs-on: ubuntu-latest
    needs: validate_inputs
    steps:
      - name: Require successful CI run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref = core.getInput('ref', { required: true });
            const normalizedRef = ref.replace(/^refs\/heads\//, '');
            const workflowFile = 'ci.yml';
            const acceptableConclusions = ['success', 'skipped'];

            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                per_page: 20,
              });

              const latestRun = data.workflow_runs?.find(
                (run) => run.head_branch === ref || run.head_branch === normalizedRef
              );

              if (!latestRun) {
                core.setFailed(
                  `No recent CI run found for ${ref}. Please ensure CI has completed before deploying.`
                );
                return;
              }

              if (!acceptableConclusions.includes(latestRun.conclusion)) {
                core.setFailed(
                  `The latest CI run for ${ref} is not successful (status: ${latestRun.conclusion}). Wait for CI to pass before deploying.`
                );
                return;
              }
            } catch (error) {
              core.setFailed(`Failed to check CI status: ${error.message}`);
              return;
            }
          ref: ${{ needs.validate_inputs.outputs.normalized_ref }}

  quality-checks:
    name: Lint, test, and build release candidate
    runs-on: ubuntu-latest
    needs:
      - validate_inputs
      - verify-ci-status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_inputs.outputs.normalized_ref }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint (if available)
        run: npm run lint --if-present

      - name: Run full test suite
        run: bash run-tests.sh

      - name: Build application
        run: npm run build

  agentic-review:
    name: Agentic pre-deployment review
    runs-on: ubuntu-latest
    needs:
      - validate_inputs
      - verify-ci-status
      - quality-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_inputs.outputs.normalized_ref }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run check --if-present

  manual-approval:
    name: Await human approval
    needs:
      - agentic-review
      - quality-checks
      - validate_inputs
      - verify-ci-status
    runs-on: ubuntu-latest
    steps:
      - name: Require manual approval before production deploy
        uses: trstringer/manual-approval@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ needs.validate_inputs.outputs.sanitized_approvers }}
          minimum-approvals: 1
          timeout-minutes: ${{ needs.validate_inputs.outputs.timeout_minutes }}

  deploy:
    name: Promote to Vercel production
    needs:
      - agentic-review
      - quality-checks
      - manual-approval
      - verify-ci-status
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_inputs.outputs.normalized_ref }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run release verification checks
        run: npm run check --if-present

      - name: Build for production
        run: npm run build

      - name: Deploy to Vercel production
        uses: vercel/actions/deploy@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: .
